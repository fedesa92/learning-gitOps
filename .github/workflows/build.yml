name: Build

on:
    pull_request:
      branches: 
       - main
    push:
      branches: 
       - main

jobs:
    build:
      name: build
      runs-on: ubuntu-latest
      
      steps:
        - name: Checkout code
          uses: actions/checkout@v4
          
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with: 
            node-version: 20
            cache: npm
            
        - name: dependencies install
          run: npm ci
        
        - name: execute build
          run: npm run build

name: PR Build

on:
    pull_request:
      branches: 
       - main
       - develop
permissions:
    contents: read

concurrency:
    group: pr-build-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    pr-target-policy:
      name: PR Target Policy
      runs-on: ubuntu-latest

      steps:
        - name: Validate source and target branches
          env:
            # Source branch containing the proposed changes.
            # Example: feature/create-gitflow-check
            HEAD_BRANCH: ${{ github.head_ref }}

            # Destination branch selected when the pull request is opened.
            # Example: develop
            BASE_BRANCH: ${{ github.base_ref }}
          run: |
            # Apply the repository GitFlow rules according to the source branch name.
            case "$HEAD_BRANCH" in
              # Feature and non-critical bug-fix branches must be integrated into develop.
              feature/*|bugfix/*)
                if [ "$BASE_BRANCH" != "develop" ]; then
                  echo "::error::$HEAD_BRANCH must target develop"
                  exit 1
                fi
                ;;

              # Stable changes collected in develop are promoted to main.
              develop)
                if [ "$BASE_BRANCH" != "main" ]; then
                  echo "::error::develop must target main"
                  exit 1
                fi
                ;;

              # A hotfix is first merged into main and then propagated to develop.
              hotfix/*)
                if [ "$BASE_BRANCH" != "main" ] && [ "$BASE_BRANCH" != "develop" ]; then
                  echo "::error::$HEAD_BRANCH must target main or develop"
                  exit 1
                fi
                ;;

              # Reject branches that do not follow one of the supported naming conventions.
              *)
                echo "::error::Unsupported source branch: $HEAD_BRANCH"
                exit 1
                ;;
            esac

    frontend-build:
      name: Frontend Build
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: frontend

      steps:
        - name: Checkout code
          uses: actions/checkout@v6
          
        - name: Setup Node.js
          uses: actions/setup-node@v5
          with: 
            node-version: 20
            cache: npm
            cache-dependency-path: frontend/package-lock.json

        - name: install dependencies
          run: npm ci
        
        - name: execute build
          run: npm run build

        - name: Run tests with coverage
          run: npm run test:coverage -- --ci

        - name: Upload frontend coverage to Codecov
          uses: codecov/codecov-action@v7
          with:
            token: ${{ secrets.CODECOV_TOKEN }}
            files: ./frontend/coverage/lcov.info
            disable_search: true
            flags: frontend
            name: frontend-coverage
            fail_ci_if_error: true

    backend-build:
      name: Backend Build
      runs-on: ubuntu-latest

      defaults:
        run:
          working-directory: backend

      steps:
        - name: Checkout code
          uses: actions/checkout@v6

        - name: Setup Java
          uses: actions/setup-java@v5
          with:
            distribution: temurin
            java-version: "21"
            cache: maven
            cache-dependency-path: backend/pom.xml

        - name: Build and test backend
          run: ./mvnw --batch-mode verify
